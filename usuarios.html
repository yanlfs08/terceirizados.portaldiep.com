<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — SGT DIEP</title>
  <meta name="description" content="Gestão de usuários do sistema — SGT DIEP">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/app.css">
  <style>
    .user-table th { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#64748b; padding:10px 14px; }
    .user-table td { padding:12px 14px; font-size:13px; vertical-align:middle; }
    .user-table tr:hover { background: rgba(59,130,246,0.04); }
    .avatar-cell { width:36px; height:36px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
    .avatar-admin { background:rgba(239,68,68,0.2); color:#ef4444; }
    .avatar-editor { background:rgba(59,130,246,0.2); color:#3b82f6; }
    .avatar-visualizador { background:rgba(148,163,184,0.2); color:#94a3b8; }
    .badge-perfil-adm { background:rgba(239,68,68,0.15); color:#f87171; font-size:10px; padding:3px 8px; border-radius:4px; }
    .badge-perfil-edi { background:rgba(59,130,246,0.15); color:#60a5fa; font-size:10px; padding:3px 8px; border-radius:4px; }
    .badge-perfil-vis { background:rgba(148,163,184,0.15); color:#94a3b8; font-size:10px; padding:3px 8px; border-radius:4px; }
    .modal-content { background:#1e293b; border:1px solid rgba(255,255,255,0.1); }
    .modal-header { border-bottom-color:rgba(255,255,255,0.08); }
    .modal-footer { border-top-color:rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="layout-sidebar"></div>
    <div class="main-wrapper">
      <div id="layout-header"></div>
      <main class="main-content">

        <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
          <div>
            <h1 class="mb-1">Usuários</h1>
            <p class="text-muted mb-0" style="font-size:13px;">Gestão de contas e permissões de acesso ao sistema</p>
          </div>
          <button class="btn btn-primary btn-sm" id="btn-novo-usuario">
            <i class="bi bi-person-plus-fill me-1"></i>Novo Usuário
          </button>
        </div>

        <div id="loading-usuarios" class="text-center py-5">
          <div class="spinner-border text-primary mb-3" role="status"></div>
          <p class="text-muted">Carregando usuários...</p>
        </div>

        <div id="painel-usuarios" style="display:none;">
          <div class="card">
            <div class="card-body p-0">
              <table class="table user-table mb-0">
                <thead>
                  <tr>
                    <th style="width:50px;"></th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Perfil</th>
                    <th>Último Acesso</th>
                    <th>Status</th>
                    <th style="width:120px;">Ações</th>
                  </tr>
                </thead>
                <tbody id="tbody-usuarios"></tbody>
              </table>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Modal Novo/Editar Usuário -->
  <div class="modal fade" id="modal-usuario" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-usuario-titulo">Novo Usuário</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Nome completo *</label>
            <input type="text" class="form-control" id="u-nome" placeholder="Ex: João da Silva" required>
          </div>
          <div class="mb-3" id="u-email-wrapper">
            <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">E-mail *</label>
            <input type="email" class="form-control" id="u-email" placeholder="joao@pbh.gov.br" required>
          </div>
          <div class="mb-3" id="u-senha-wrapper">
            <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Senha inicial *</label>
            <input type="password" class="form-control" id="u-senha" placeholder="Mínimo 6 caracteres">
            <div class="form-text">O usuário poderá trocar a senha após o primeiro acesso.</div>
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Perfil *</label>
            <select class="form-select" id="u-perfil">
              <option value="visualizador">Visualizador — só leitura</option>
              <option value="editor">Editor — cria e edita vagas</option>
              <option value="admin">Administrador — acesso total</option>
            </select>
          </div>
          <div class="form-check form-switch" id="u-ativo-wrapper" style="display:none;">
            <input class="form-check-input" type="checkbox" id="u-ativo" checked>
            <label class="form-check-label" for="u-ativo">Usuário ativo</label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="btn-salvar-usuario">
            <i class="bi bi-floppy-fill me-1"></i>Salvar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/usuarios.js"></script>
</body>
</html>
