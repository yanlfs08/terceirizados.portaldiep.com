<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unidades — SGT DIEP</title>
  <meta name="description" content="Gestão de unidades de lotação do sistema — SGT DIEP">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/app.css">
  <style>
    .unidade-table th { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#64748b; padding:10px 14px; }
    .unidade-table td { padding:12px 14px; font-size:13px; vertical-align:middle; }
    .unidade-table tr:hover { background: rgba(59,130,246,0.04); }
    .badge-ativo { background:rgba(34,197,94,0.15); color:#22c55e; font-size:10px; padding:3px 8px; border-radius:4px; }
    .badge-inativo { background:rgba(239,68,68,0.15); color:#ef4444; font-size:10px; padding:3px 8px; border-radius:4px; }
    .modal-content { background:#1e293b; color:#fff; border:1px solid rgba(255,255,255,0.1); }
    .modal-header { border-bottom-color:rgba(255,255,255,0.08); }
    .modal-footer { border-top-color:rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="layout-sidebar"></div>
    <div class="main-wrapper">
      <div id="layout-header"></div>
      <main class="main-content">

        <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
          <div>
            <h1 class="mb-1">Unidades</h1>
            <p class="text-muted mb-0" style="font-size:13px;">Gestão de lotações para alocação de terceirizados</p>
          </div>
          <button class="btn btn-primary btn-sm" id="btn-nova-unidade">
            <i class="bi bi-building-add me-1"></i>Nova Unidade
          </button>
        </div>

        <div id="loading-unidades" class="text-center py-5">
          <div class="spinner-border text-primary mb-3" role="status"></div>
          <p class="text-muted">Carregando unidades...</p>
        </div>

        <div id="painel-unidades" style="display:none;">
          <div class="card">
            <div class="card-body p-0">
              <table class="table unidade-table mb-0">
                <thead>
                  <tr>
                    <th>Sigla</th>
                    <th>Nome Completo</th>
                    <th>Hierarquia</th>
                    <th>Localidade</th>
                    <th>Status</th>
                    <th style="width:120px;">Ações</th>
                  </tr>
                </thead>
                <tbody id="tbody-unidades"></tbody>
              </table>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Modal Novo/Editar Unidade -->
  <div class="modal fade" id="modal-unidade" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-unidade-titulo">Nova Unidade</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Sigla da Unidade *</label>
              <input type="text" class="form-control" id="u-sigla" placeholder="Ex: GCOSE" required>
            </div>
            <div class="col-md-8">
              <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Nome Completo da Unidade *</label>
              <input type="text" class="form-control" id="u-nome" placeholder="Ex: Gerência de Contratação..." required>
            </div>
            <div class="col-12">
              <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Hierarquia</label>
              <input type="text" class="form-control" id="u-hierarquia" placeholder="Ex: SMSA | SUOGF | DLOS | GCOSE">
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Localidade *</label>
              <select class="form-select" id="u-localidade" required>
                <option value="">Selecione...</option>
                <option value="NÍVEL CENTRAL">Nível Central</option>
                <option value="BARREIRO">Barreiro</option>
                <option value="CENTRO-SUL">Centro-Sul</option>
                <option value="LESTE">Leste</option>
                <option value="NORDESTE">Nordeste</option>
                <option value="NORTE">Norte</option>
                <option value="NOROESTE">Noroeste</option>
                <option value="OESTE">Oeste</option>
                <option value="PAMPULHA">Pampulha</option>
                <option value="VENDA NOVA">Venda Nova</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Responsável</label>
              <input type="text" class="form-control" id="u-responsavel" placeholder="Nome do gestor">
            </div>
            <div class="col-md-4">
              <label class="form-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">E-mail da Unidade</label>
              <input type="email" class="form-control" id="u-email" placeholder="email@pbh.gov.br">
            </div>
            <div class="col-12 mt-3">
              <div class="form-check form-switch" id="u-ativo-wrapper" style="display:none;">
                <input class="form-check-input" type="checkbox" id="u-ativo" checked>
                <label class="form-check-label" for="u-ativo">Unidade ativa</label>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="btn-salvar-unidade">
            <i class="bi bi-floppy-fill me-1"></i>Salvar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/unidades.js"></script>
</body>
</html>
