<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>Acesso Negado — SGT DIEP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap">
  <style>
    body {
      font-family: 'Sora', sans-serif;
      background: #0f1623;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .box {
      text-align: center;
      max-width: 380px;
    }
    .icon-wrap {
      width: 72px;
      height: 72px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #ef4444;
      margin: 0 auto 24px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    p  { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 28px; }
    .btn-back {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .btn-back:hover { background: #2563eb; color: #fff; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon-wrap"><i class="bi bi-shield-fill-x"></i></div>

    <a href="/dashboard.html" class="btn-back">

</html>
