<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema de Gestão de Terceirizados - DIEP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: #0f1623;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Grade decorativa */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow de fundo */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      background: #1a2336;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .login-logo {
      width: 48px;
      height: 48px;
      background: #3b82f6;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      margin: 0 auto 20px;
    }

    .login-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 1.3;
    }

    .login-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: 6px;
      margin-bottom: 32px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-bottom: 6px;
    }

    .form-control {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-control:focus {
      background: rgba(255,255,255,0.08);
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
      color: #fff;
      outline: none;
    }

    .form-control::placeholder { color: rgba(255,255,255,0.25); }

    .input-icon {
      position: relative;
    }

    .input-icon i {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 15px;
      pointer-events: none;
    }

    .input-icon .form-control {
      padding-left: 38px;
    }

    .btn-login {
      width: 100%;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      margin-top: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover:not(:disabled) { background: #2563eb; }
    .btn-login:active:not(:disabled) { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert-erro {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .alert-erro.visible { display: flex; }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11.5px;
      color: rgba(255,255,255,0.2);
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .spinner.visible { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-people-fill"></i>
    </div>
    <div class="login-title">Sistema de Gestão de<br>Terceirizados</div>
    <div class="login-subtitle">DIEP — Acesso Restrito</div>

    <form id="form-login" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">E-mail</label>
        <div class="input-icon">
          <i class="bi bi-envelope-fill"></i>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="seu@email.com"
            autocomplete="username"
            required
          >
        </div>
      </div>

      <div class="mb-1">
        <label class="form-label" for="senha">Senha</label>
        <div class="input-icon">
          <i class="bi bi-lock-fill"></i>
          <input
            type="password"
            id="senha"
            class="form-control"
            placeholder="••••••••••"
            autocomplete="current-password"
            required
          >
        </div>
      </div>

      <div class="alert-erro" id="alerta-erro">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="msg-erro">E-mail ou senha inválidos.</span>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <span class="spinner" id="spinner-login"></span>
        <span id="btn-login-text">Entrar</span>
      </button>
    </form>

    <div class="login-footer">
      Secretaria Municipal de Saúde — PBH
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { login } from "./assets/js/auth.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { auth, db } from "./assets/js/firebase-config.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // Se já estiver logado, redireciona direto
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists() && snap.data().ativo) {
          window.location.href = "/dashboard.html";
        }
      }
    });

    const form      = document.getElementById("form-login");
    const btnLogin  = document.getElementById("btn-login");
    const btnText   = document.getElementById("btn-login-text");
    const spinner   = document.getElementById("spinner-login");
    const alertErro = document.getElementById("alerta-erro");
    const msgErro   = document.getElementById("msg-erro");

    function setLoading(v) {
      btnLogin.disabled = v;
      spinner.classList.toggle("visible", v);
      btnText.textContent = v ? "Entrando..." : "Entrar";
    }

    function mostrarErro(msg) {
      msgErro.textContent = msg;
      alertErro.classList.add("visible");
    }

    function limparErro() {
      alertErro.classList.remove("visible");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      limparErro();

      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;

      if (!email || !senha) {
        mostrarErro("Preencha o e-mail e a senha.");
        return;
      }

      setLoading(true);

      try {
        const cred = await login(email, senha);

        // Verifica se usuário está ativo no Firestore
        const snap = await getDoc(doc(db, "users", cred.user.uid));

        if (!snap.exists() || snap.data().ativo === false) {
          await auth.signOut();
          mostrarErro("Seu acesso está bloqueado. Contate o administrador.");
          setLoading(false);
          return;
        }

        window.location.href = "/dashboard.html";

      } catch (err) {
        setLoading(false);
        const codigo = err.code ?? "";
        if (codigo.includes("user-not-found") || codigo.includes("wrong-password") || codigo.includes("invalid-credential")) {
          mostrarErro("E-mail ou senha inválidos.");
        } else if (codigo.includes("too-many-requests")) {
          mostrarErro("Muitas tentativas. Aguarde alguns minutos e tente novamente.");
        } else {
          mostrarErro("Erro ao fazer login. Tente novamente.");
        }
      }
    });
  </script>
</body>
</html>
