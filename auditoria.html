<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoria — SGT DIEP</title>
  <meta name="description" content="Log de auditoria de ações — SGT DIEP">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/app.css">
  <style>
    .audit-table th { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#64748b; padding:10px 12px; }
    .audit-table td { padding:9px 12px; font-size:12px; vertical-align:middle; }
    .audit-table tr { cursor:pointer; }
    .audit-table tr:hover { background: rgba(59,130,246,0.05); }
    .audit-table tr.expanded { background: rgba(59,130,246,0.08); }
    .audit-detail-row td { padding:0 !important; background: rgba(15,23,42,0.5); }
    .audit-detail-inner { padding:12px 16px; font-family: monospace; font-size:11px; color:#94a3b8; white-space:pre-wrap; }
    .filtro-card { background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px 20px; margin-bottom:20px; }
    .filtro-card .form-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#64748b; }
    .badge-acao { font-size:10px; font-weight:700; letter-spacing:.04em; padding:3px 7px; border-radius:4px; }
    .acao-create { background:rgba(34,197,94,0.15); color:#22c55e; }
    .acao-update { background:rgba(59,130,246,0.15); color:#60a5fa; }
    .acao-delete { background:rgba(239,68,68,0.15); color:#f87171; }
    .acao-other  { background:rgba(148,163,184,0.15); color:#94a3b8; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="layout-sidebar"></div>
    <div class="main-wrapper">
      <div id="layout-header"></div>
      <main class="main-content">

        <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
          <div>
            <h1 class="mb-1">Auditoria</h1>
            <p class="text-muted mb-0" style="font-size:13px;">Histórico de todas as ações realizadas no sistema</p>
          </div>
          <span class="badge bg-secondary fs-6" id="badge-audit-total">— registros</span>
        </div>

        <div class="filtro-card">
          <div class="row g-3">
            <div class="col-12 col-sm-6 col-lg-3">
              <label class="form-label">Usuário</label>
              <select class="form-select form-select-sm" id="f-audit-usuario"><option value="">Todos</option></select>
            </div>
            <div class="col-12 col-sm-6 col-lg-2">
              <label class="form-label">Ação</label>
              <select class="form-select form-select-sm" id="f-audit-acao">
                <option value="">Todas</option>
                <option>CREATE_VAGA</option><option>UPDATE_VAGA</option><option>DELETE_VAGA</option>
                <option>CREATE_CARGO</option><option>UPDATE_CARGO</option><option>DELETE_CARGO</option>
                <option>CREATE_EMPRESA</option><option>UPDATE_EMPRESA</option>
                <option>CREATE_USER</option><option>UPDATE_USER</option>
              </select>
            </div>
            <div class="col-12 col-sm-6 col-lg-2">
              <label class="form-label">Data início</label>
              <input type="date" class="form-control form-control-sm" id="f-audit-inicio">
            </div>
            <div class="col-12 col-sm-6 col-lg-2">
              <label class="form-label">Data fim</label>
              <input type="date" class="form-control form-control-sm" id="f-audit-fim">
            </div>
            <div class="col-12 col-lg-3 d-flex align-items-end gap-2">
              <input type="text" class="form-control form-control-sm" id="f-audit-busca" placeholder="Buscar documento ID...">
              <button class="btn btn-outline-secondary btn-sm" id="btn-limpar-audit">
                <i class="bi bi-x-circle"></i>
              </button>
            </div>
          </div>
        </div>

        <div id="loading-audit" class="text-center py-5">
          <div class="spinner-border text-primary mb-3" role="status"></div>
          <p class="text-muted">Carregando log de auditoria...</p>
        </div>

        <div id="painel-audit" style="display:none;">
          <p class="text-muted mb-2" style="font-size:13px;" id="audit-info">—</p>
          <div class="card">
            <div class="card-body p-0">
              <table class="table audit-table mb-0" id="tabela-audit">
                <thead>
                  <tr>
                    <th>Data/Hora</th>
                    <th>Usuário</th>
                    <th>Ação</th>
                    <th>Coleção</th>
                    <th>Documento ID</th>
                    <th style="width:40px;"></th>
                  </tr>
                </thead>
                <tbody id="tbody-audit"></tbody>
              </table>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mt-3">
            <button class="btn btn-sm btn-outline-secondary" id="btn-audit-ant" disabled>
              <i class="bi bi-chevron-left me-1"></i>Anterior
            </button>
            <span class="text-muted" style="font-size:12px;" id="audit-pag-info">—</span>
            <button class="btn btn-sm btn-outline-secondary" id="btn-audit-prox" disabled>
              Próximo<i class="bi bi-chevron-right ms-1"></i>
            </button>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/auditoria.js"></script>
</body>
</html>
